<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mes Résultats - UNILU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f8fafc; }
        .header { background: linear-gradient(90deg, #001f3f, #003366); }
        .nav-fixed { position: sticky; top: 0; z-index: 50; background: white; box-shadow: 0 4px 12px rgba(0,31,63,0.1); }
        .result-card { transition: all 0.3s; }
        .result-card:hover { transform: translateY(-3px); }
        table { border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: center; }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div class="header text-white py-6 md:py-8">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold">UNILU</h1>
                    <p class="text-lg md:text-xl mt-1 opacity-90">Plateforme des Résultats Académiques</p>
                </div>
                <div class="text-left sm:text-right">
                    <p id="matricule-display" class="font-mono text-base md:text-lg opacity-75"></p>
                    <p id="welcome" class="text-xl md:text-2xl font-medium"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-fixed">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-col sm:flex-row gap-3">
                <button onclick="showSection('interrogation')" id="btn-interro" class="tab-button active flex-1 flex items-center justify-center gap-3 py-4 px-6 rounded-3xl border-2 border-[#001f3f] font-semibold">
                    <span class="text-2xl">📝</span> INTERROGATIONS
                </button>
                <button onclick="showSection('examen')" id="btn-examen" class="tab-button flex-1 flex items-center justify-center gap-3 py-4 px-6 rounded-3xl border-2 border-[#001f3f] font-semibold">
                    <span class="text-2xl">📕</span> EXAMENS
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
        <div id="results-container" class="space-y-12"></div>
    </div>

    <script>
        let allResults = [];

        async function loadResults() {
            const matricule = new URLSearchParams(window.location.search).get('matricule');
            if (!matricule) return;

            document.getElementById('matricule-display').textContent = matricule;

            const validateRes = await fetch('/api/validate_matricule', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({matricule})
            });
            const studentData = await validateRes.json();
            document.getElementById('welcome').innerHTML = `👋 Bienvenue <span class="font-semibold">${studentData.nom_complet}</span>`;

            const res = await fetch(`/api/get_results?matricule=${matricule}`);
            allResults = await res.json();

            const container = document.getElementById('results-container');
            container.innerHTML = `
                <div class="text-center py-12 md:py-20">
                    <h2 class="text-3xl font-semibold text-[#001f3f] mb-3">📋 Vos résultats</h2>
                    <p class="text-gray-500">Cliquez sur un bouton ci-dessus</p>
                </div>
                <div id="section-interro" class="hidden"></div>
                <div id="section-examen" class="hidden"></div>
            `;
        }

        function createExamenCard(r) {
            const isEchec = r.status === 'ÉCHEC';
            return `
            <div class="result-card bg-white rounded-3xl shadow-sm border border-gray-100 p-7">
                <div class="flex justify-between">
                    <div>
                        <span class="px-4 py-1 bg-purple-100 text-purple-700 rounded-3xl text-sm font-bold">EXAMEN</span>
                        <h4 class="text-xl font-semibold mt-4">${r.course}</h4>
                    </div>
                    <span class="px-5 py-2 rounded-3xl text-sm font-bold ${isEchec ? 'bg-red-100 text-red-700' : 'bg-emerald-100 text-emerald-700'}">${r.status}</span>
                </div>
                <div class="flex items-baseline gap-3 mt-8">
                    <span class="text-6xl font-semibold text-[#001f3f]">${r.cote}</span>
                    <span class="text-3xl text-gray-400">/</span>
                    <span class="text-3xl text-gray-400">${r.ponderation}</span>
                </div>
                <p class="text-sm text-gray-500 mt-6">${r.date}</p>
            </div>`;
        }

        function createInterroTable(courseResults) {
            let rows = '';
            let totalCote = 0;
            let count = 0;

            const order = ['td', 'tp', 'application', 'interrogation'];
            const labels = {td: 'TD', tp: 'TP', application: 'Application', interrogation: 'Interrogation'};

            order.forEach(key => {
                const item = courseResults.find(r => r.type === key);
                if (item) {
                    const isEchec = item.status === 'ÉCHEC';
                    rows += `
                    <tr class="border-b">
                        <td class="font-medium text-left">${labels[key]}</td>
                        <td class="font-semibold">${item.cote} / ${item.ponderation}</td>
                        <td class="${isEchec ? 'text-red-600' : 'text-emerald-600'}">${item.status}</td>
                        <td class="text-xs text-gray-500">${item.date}</td>
                    </tr>`;
                    totalCote += item.cote;
                    count++;
                }
            });

            const moyenne = count > 0 ? (totalCote / count).toFixed(2) : 0;

            return `
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-7">
                <h4 class="text-xl font-semibold mb-6">${courseResults[0].course}</h4>
                <table class="w-full">
                    <thead>
                        <tr class="border-b text-gray-500 text-sm">
                            <th class="text-left">Composant</th>
                            <th>Cote</th>
                            <th>Statut</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
                <div class="mt-6 flex justify-between items-center bg-gray-50 rounded-2xl p-4">
                    <span class="font-semibold text-lg">Moyenne Interrogation :</span>
                    <span class="text-4xl font-bold text-[#001f3f]">${moyenne}</span>
                </div>
            </div>`;
        }

        function showSection(type) {
            document.getElementById('section-interro').classList.add('hidden');
            document.getElementById('section-examen').classList.add('hidden');
            document.getElementById('btn-interro').classList.remove('active');
            document.getElementById('btn-examen').classList.remove('active');

            const container = document.getElementById(type === 'interrogation' ? 'section-interro' : 'section-examen');
            container.classList.remove('hidden');

            if (type === 'interrogation') document.getElementById('btn-interro').classList.add('active');
            else document.getElementById('btn-examen').classList.add('active');

            // Grouper par cours
            const grouped = {};
            allResults.filter(r => (type === 'interrogation' ? ['td','tp','application','interrogation'] : ['examen']).includes(r.type))
                      .forEach(r => {
                          if (!grouped[r.course]) grouped[r.course] = [];
                          grouped[r.course].push(r);
                      });

            let html = `<h3 class="text-2xl font-semibold text-[#001f3f] mb-8">${type.toUpperCase()}</h3>`;
            Object.keys(grouped).forEach(course => {
                if (type === 'interrogation') {
                    html += createInterroTable(grouped[course]);
                } else {
                    html += createExamenCard(grouped[course][0]);
                }
            });

            if (Object.keys(grouped).length === 0) {
                html += `<p class="text-gray-400 text-center py-16">Aucune ${type} publiée pour le moment.</p>`;
            }

            container.innerHTML = html;
        }

        window.onload = loadResults;
    </script>
</body>
</html>
