<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Résultats - UNILU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .result-card { transition: all 0.3s; }
        .result-card:hover { transform: translateY(-4px); box-shadow: 0 20px 30px rgba(0,31,63,0.2); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-5xl mx-auto p-8">
        <div class="bg-[#001f3f] text-white rounded-3xl p-8 mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold">UNILU - Résultats Académiques</h1>
                <p id="welcome" class="text-xl mt-2"></p>
            </div>
            <div class="text-right">
                <p class="text-sm opacity-75">Matricule :</p>
                <p id="matricule-display" class="text-2xl font-mono"></p>
            </div>
        </div>

        <div id="results-container" class="space-y-12"></div>
    </div>

    <script>
        async function loadResults() {
            const urlParams = new URLSearchParams(window.location.search);
            const matricule = urlParams.get('matricule');
            document.getElementById('matricule-display').textContent = matricule;

            const res = await fetch(`/api/get_results?matricule=${matricule}`);
            const results = await res.json();

            // Récupérer le nom pour le message de bienvenue
            const validateRes = await fetch('/api/validate_matricule', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({matricule})
            });
            const studentData = await validateRes.json();
            document.getElementById('welcome').innerHTML = `👋 Bienvenue <span class="font-bold">${studentData.nom_complet}</span> !`;

            const container = document.getElementById('results-container');
            container.innerHTML = `
                <h2 class="text-3xl font-semibold text-[#001f3f] mb-6">📋 Vos résultats</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="interro-section"></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-12" id="examen-section"></div>
            `;

            const interroDiv = document.getElementById('interro-section');
            const examenDiv = document.getElementById('examen-section');

            let hasInterro = false, hasExamen = false;

            results.forEach(r => {
                const isFail = r.status === 'ÉCHEC';
                const card = `
                <div class="result-card bg-white border border-gray-200 rounded-3xl p-8 ${isFail ? 'border-red-500' : ''}">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="inline-block px-4 py-1 rounded-3xl text-sm font-bold ${r.type === 'interrogation' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}">
                                ${r.type === 'interrogation' ? 'INTERROGATION' : 'EXAMEN'}
                            </span>
                            <h3 class="text-2xl font-semibold mt-4">${r.course}</h3>
                            <p class="text-5xl font-bold mt-6 ${isFail ? 'text-red-600' : 'text-[#001f3f]'}">${r.cote} / ${r.ponderation}</p>
                            <p class="text-sm text-gray-500 mt-2">${r.date}</p>
                        </div>
                        <div class="text-right">
                            <span class="px-6 py-3 rounded-3xl text-lg font-bold ${isFail ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">
                                ${r.status}
                            </span>
                        </div>
                    </div>
                </div>`;

                if (r.type === 'interrogation') {
                    interroDiv.innerHTML += card;
                    hasInterro = true;
                } else {
                    examenDiv.innerHTML += card;
                    hasExamen = true;
                }
            });

            if (!hasInterro) interroDiv.innerHTML = `<p class="text-gray-400 col-span-2 text-center py-12">Aucune interrogation publiée pour le moment.</p>`;
            if (!hasExamen) examenDiv.innerHTML = `<p class="text-gray-400 col-span-2 text-center py-12">Aucun examen publié pour le moment.</p>`;
        }

        window.onload = loadResults;
    </script>
</body>
</html>
