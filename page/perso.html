<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Résultats - UNILU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f8fafc; }
        .header { background: linear-gradient(90deg, #001f3f, #003366); }
        
        /* Barre de navigation fixe */
        .nav-fixed {
            position: sticky;
            top: 0;
            z-index: 50;
            background: white;
            box-shadow: 0 4px 12px rgba(0, 31, 63, 0.1);
        }

        .tab-button {
            transition: all 0.3s ease;
        }
        
        .tab-button.active {
            background-color: #001f3f;
            color: white;
            box-shadow: 0 10px 15px rgba(0, 31, 63, 0.2);
        }

        .result-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .result-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgb(0 31 63 / 0.1);
        }
    </style>
</head>
<body class="min-h-screen pb-12">
    <!-- HEADER FIXE -->
    <div class="header text-white py-8">
        <div class="max-w-5xl mx-auto px-8 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-bold tracking-tight">UNILU</h1>
                <p class="text-xl mt-1 opacity-90">Plateforme des Résultats Académiques</p>
            </div>
            <div class="text-right">
                <p id="matricule-display" class="font-mono text-lg opacity-75"></p>
                <p id="welcome" class="text-2xl font-medium mt-1"></p>
            </div>
        </div>
    </div>

    <!-- BARRE DE SÉLECTION TRÈS VISIBLE (fixe au scroll) -->
    <div class="nav-fixed">
        <div class="max-w-5xl mx-auto px-8 py-5">
            <div class="flex gap-4">
                <!-- Bouton Interrogations -->
                <button onclick="showSection('interro')" 
                        id="btn-interro"
                        class="tab-button active flex-1 flex items-center justify-center gap-3 py-5 px-8 rounded-3xl text-xl font-semibold border-2 border-[#001f3f]">
                    <span class="text-2xl">📝</span>
                    INTERROGATIONS
                </button>

                <!-- Bouton Examens -->
                <button onclick="showSection('examen')" 
                        id="btn-examen"
                        class="tab-button flex-1 flex items-center justify-center gap-3 py-5 px-8 rounded-3xl text-xl font-semibold border-2 border-[#001f3f]">
                    <span class="text-2xl">📕</span>
                    EXAMENS
                </button>
            </div>
        </div>
    </div>

    <!-- CONTENU PRINCIPAL -->
    <div class="max-w-5xl mx-auto px-8 mt-8">
        <div id="results-container" class="space-y-12"></div>
    </div>

    <script>
        let allResults = [];

        async function loadResults() {
            const urlParams = new URLSearchParams(window.location.search);
            const matricule = urlParams.get('matricule');
            
            if (!matricule) return;

            document.getElementById('matricule-display').textContent = matricule;

            // Récupération du nom de l'étudiant
            const validateRes = await fetch('/api/validate_matricule', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({matricule})
            });
            const studentData = await validateRes.json();
            document.getElementById('welcome').innerHTML = 
                `👋 Bienvenue <span class="font-semibold">${studentData.nom_complet}</span>`;

            // Récupération des résultats
            const res = await fetch(`/api/get_results?matricule=${matricule}`);
            allResults = await res.json();

            // Affichage initial : rien n'est montré (étudiant doit cliquer sur un bouton)
            const container = document.getElementById('results-container');
            container.innerHTML = `
                <div class="text-center py-20">
                    <h2 class="text-3xl font-semibold text-[#001f3f] mb-3">📋 Vos résultats</h2>
                    <p class="text-gray-500 text-lg">Cliquez sur l'un des boutons ci-dessus pour voir vos notes</p>
                </div>
                
                <!-- Section Interrogations (cachée par défaut) -->
                <div id="section-interro" class="hidden">
                    <h3 class="text-2xl font-semibold text-[#001f3f] mb-8 flex items-center gap-3">
                        <span class="w-4 h-4 bg-blue-500 rounded-full"></span>
                        INTERROGATIONS
                    </h3>
                    <div id="interro-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                </div>

                <!-- Section Examens (cachée par défaut) -->
                <div id="section-examen" class="hidden">
                    <h3 class="text-2xl font-semibold text-[#001f3f] mb-8 flex items-center gap-3">
                        <span class="w-4 h-4 bg-purple-600 rounded-full"></span>
                        EXAMENS
                    </h3>
                    <div id="examen-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                </div>
            `;
        }

        function createCard(r) {
            const isEchec = r.status === 'ÉCHEC';
            return `
            <div class="result-card bg-white rounded-3xl shadow-sm border border-gray-100 p-7">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h4 class="text-xl font-semibold text-gray-800">${r.course}</h4>
                    </div>
                    <div class="text-right">
                        <span class="px-5 py-2 rounded-3xl text-sm font-bold
                            ${isEchec ? 'bg-red-100 text-red-700' : 'bg-emerald-100 text-emerald-700'}">
                            ${r.status}
                        </span>
                    </div>
                </div>

                <div class="flex items-baseline gap-3">
                    <span class="text-6xl font-semibold text-[#001f3f]">${r.cote}</span>
                    <span class="text-3xl text-gray-400">/</span>
                    <span class="text-3xl font-medium text-gray-400">${r.ponderation}</span>
                </div>

                <p class="text-sm text-gray-500 mt-6">${r.date}</p>
            </div>`;
        }

        function showSection(type) {
            // Masquer les deux sections
            document.getElementById('section-interro').classList.add('hidden');
            document.getElementById('section-examen').classList.add('hidden');

            // Désactiver les deux boutons
            document.getElementById('btn-interro').classList.remove('active');
            document.getElementById('btn-examen').classList.remove('active');

            // Activer le bouton cliqué
            if (type === 'interro') {
                document.getElementById('btn-interro').classList.add('active');
                document.getElementById('section-interro').classList.remove('hidden');
            } else {
                document.getElementById('btn-examen').classList.add('active');
                document.getElementById('section-examen').classList.remove('hidden');
            }

            // Filtrer et afficher les résultats correspondants
            const filtered = allResults.filter(r => r.type === type);

            const gridId = type === 'interro' ? 'interro-grid' : 'examen-grid';
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <p class="text-gray-400 text-center py-16 col-span-2">
                        Aucune ${type === 'interro' ? 'interrogation' : 'examen'} publiée pour le moment.
                    </p>`;
                return;
            }

            filtered.forEach(r => {
                grid.innerHTML += createCard(r);
            });
        }

        // Chargement au démarrage
        window.onload = loadResults;
    </script>
</body>
</html>
