<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mes Résultats - UNILU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f8fafc; }
        .header { background: linear-gradient(90deg, #001f3f, #003366); }
        .nav-fixed { position: sticky; top: 0; z-index: 50; background: white; box-shadow: 0 4px 12px rgba(0,31,63,0.1); }
        .result-card { transition: all 0.3s; }
        .result-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div class="header text-white py-6 md:py-8">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold">UNILU</h1>
                    <p class="text-lg md:text-xl mt-1 opacity-90">Plateforme des Résultats Académiques</p>
                </div>
                <div class="text-left sm:text-right">
                    <p id="matricule-display" class="font-mono text-base md:text-lg opacity-75"></p>
                    <p id="welcome" class="text-xl md:text-2xl font-medium"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-fixed">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-col sm:flex-row gap-3">
                <button onclick="showSection('moyenne_periode')" id="btn-periode" 
                        class="tab-button active flex-1 flex items-center justify-center gap-3 py-4 px-6 rounded-3xl border-2 border-[#001f3f] font-semibold">
                    <span class="text-2xl">📊</span> MOYENNE PÉRIODE
                </button>
                <button onclick="showSection('examen')" id="btn-examen" 
                        class="tab-button flex-1 flex items-center justify-center gap-3 py-4 px-6 rounded-3xl border-2 border-[#001f3f] font-semibold">
                    <span class="text-2xl">📕</span> EXAMENS
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
        <div id="results-container" class="space-y-12"></div>
    </div>

    <script>
        let allResults = [];

        async function loadResults() {
            const matricule = new URLSearchParams(window.location.search).get('matricule');
            if (!matricule) return;

            document.getElementById('matricule-display').textContent = matricule;

            const validateRes = await fetch('/api/validate_matricule', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({matricule})
            });
            const studentData = await validateRes.json();
            document.getElementById('welcome').innerHTML = `👋 Bienvenue <span class="font-semibold">${studentData.nom_complet}</span>`;

            const res = await fetch(`/api/get_results?matricule=${matricule}`);
            allResults = await res.json();

            const container = document.getElementById('results-container');
            container.innerHTML = `
                <div class="text-center py-12 md:py-20">
                    <h2 class="text-3xl font-semibold text-[#001f3f] mb-3">📋 Vos résultats</h2>
                    <p class="text-gray-500">Sélectionnez une section ci-dessus</p>
                </div>
                <div id="section-periode" class="hidden"></div>
                <div id="section-examen" class="hidden"></div>
            `;
        }

        function createResultCard(r, type) {
            const isEchec = r.status === 'ÉCHEC';
            const title = type === 'moyenne_periode' ? 'MOYENNE PÉRIODE' : 'EXAMEN';
            const emoji = type === 'moyenne_periode' ? '📊' : '📕';

            return `
            <div class="result-card bg-white rounded-3xl shadow-sm border border-gray-100 p-7">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="px-4 py-1 bg-blue-100 text-blue-700 rounded-3xl text-sm font-bold">${emoji} ${title}</span>
                        <h4 class="text-xl font-semibold mt-4">${r.course}</h4>
                    </div>
                    <span class="px-5 py-2 rounded-3xl text-sm font-bold ${isEchec ? 'bg-red-100 text-red-700' : 'bg-emerald-100 text-emerald-700'}">
                        ${r.status}
                    </span>
                </div>
                <div class="flex items-baseline gap-3 mt-8">
                    <span class="text-6xl font-semibold text-[#001f3f]">${r.cote}</span>
                    <span class="text-3xl text-gray-400">/</span>
                    <span class="text-3xl text-gray-400">${r.ponderation}</span>
                </div>
                <p class="text-sm text-gray-500 mt-6">${r.date}</p>
            </div>`;
        }

        function showSection(type) {
            document.getElementById('section-periode').classList.add('hidden');
            document.getElementById('section-examen').classList.add('hidden');
            document.getElementById('btn-periode').classList.remove('active');
            document.getElementById('btn-examen').classList.remove('active');

            const container = document.getElementById(type === 'moyenne_periode' ? 'section-periode' : 'section-examen');
            container.classList.remove('hidden');

            if (type === 'moyenne_periode') document.getElementById('btn-periode').classList.add('active');
            else document.getElementById('btn-examen').classList.add('active');

            const filtered = allResults.filter(r => r.type === type);

            let html = `<h3 class="text-2xl font-semibold text-[#001f3f] mb-8">${type === 'moyenne_periode' ? 'MOYENNE PÉRIODE' : 'EXAMENS'}</h3>`;

            if (filtered.length === 0) {
                html += `<p class="text-gray-400 text-center py-16">Aucun résultat publié pour le moment.</p>`;
            } else {
                filtered.forEach(r => html += createResultCard(r, type));
            }

            container.innerHTML = html;
        }

        window.onload = loadResults;
    </script>
</body>
</html>
