<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNILU - Connexion Étudiant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #001f3f, #003366); 
        }
        .card { 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
        }
        .header { 
            background: linear-gradient(90deg, #001f3f, #003366); 
        }
        /* Correction importante : texte noir dans le champ input */
        input#matricule {
            color: #111827 !important; /* gris foncé très lisible */
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- ==================== HEADER COMMUN (logos + nom université) ==================== -->
    <div class="header text-white py-6 md:py-8">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between gap-6">
                
                <!-- LOGO GAUCHE : unilu.png -->
                <div class="flex-shrink-0">
                    <img src="/static/unilu.png" 
                         alt="Logo Université de Lubumbashi" 
                         class="h-14 md:h-16 w-auto drop-shadow-md">
                </div>

                <!-- TEXTE CENTRAL -->
                <div class="text-center flex-1">
                    <h1 class="text-3xl md:text-4xl font-bold tracking-tight leading-none">
                        UNIVERSITÉ DE LUBUMBASHI
                    </h1>
                    <p class="text-lg md:text-xl mt-1 font-medium opacity-95">
                        FACULTÉ DE SCIENCES AGRONOMIQUES ET ENVIRONNEMENT
                    </p>
                    <!-- Titre de la plateforme (comme demandé) -->
                    <p class="mt-3 text-base md:text-lg font-semibold opacity-90">
                        Plateforme des Résultats Académiques
                    </p>
                </div>

                <!-- LOGO DROITE : sa.png -->
                <div class="flex-shrink-0">
                    <img src="/static/sa.png" 
                         alt="Logo Faculté des Sciences Agronomiques" 
                         class="h-14 md:h-16 w-auto drop-shadow-md">
                </div>

            </div>
        </div>
    </div>

    <!-- ==================== CONTENU PRINCIPAL (carte de connexion) ==================== -->
    <div class="flex items-center justify-center py-12 px-4">
        <div class="card w-full max-w-md p-10">
            <h2 class="text-2xl font-semibold text-center mb-8 text-[#001f3f]">
                Connexion Étudiant
            </h2>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Matricule</label>
                    <input id="matricule" 
                           type="text" 
                           placeholder="Ex: UNILU25L10001"
                           class="w-full px-4 py-4 border border-gray-300 rounded-2xl 
                                  focus:outline-none focus:border-[#001f3f] text-lg">
                </div>
                
                <button onclick="connecter()" 
                        class="w-full bg-[#001f3f] hover:bg-blue-900 text-white py-5 
                               rounded-2xl text-xl font-semibold transition">
                    Se connecter
                </button>
            </div>
            
            <p id="message" class="mt-6 text-center text-red-600 font-medium"></p>
        </div>
    </div>

    <script>
        function connecter() {
            const matricule = document.getElementById('matricule').value.trim();
            
            if (!matricule) {
                document.getElementById('message').textContent = "Veuillez entrer votre matricule";
                return;
            }

            fetch('/api/validate_matricule', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ matricule })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.href = `/perso.html?matricule=${encodeURIComponent(matricule)}`;
                } else {
                    document.getElementById('message').textContent = "Matricule invalide ou inexistant";
                }
            })
            .catch(() => {
                document.getElementById('message').textContent = "Erreur de connexion au serveur";
            });
        }

        // Petit bonus : focus automatique sur le champ
        window.onload = () => {
            document.getElementById('matricule').focus();
        };
    </script>
</body>
</html>
